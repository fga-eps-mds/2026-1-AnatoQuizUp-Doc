site_name: AnatoQuizUp
site_description: AnatoQuizUp e um jogo de perguntas e respostas sobre anatomia humana, desenvolvido para ajudar estudantes de medicina a aprenderem de forma divertida e interativa.

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs

nav:
  - Inicio: index.md

  - Produto:
      - Visao do Produto: produto/visao.md
      - Lean Inception: produto/lean_inception.md
      - Prototipos: prototipo/figma.md

  - Planejamento:
      - Visao Geral:
          - Roadmap e Releases: processo/roadmap.md
          - Datas Importantes: processo/datas-importantes.md
      - Backlog:
          - Visao Geral: backlog/overview.md
          - Requisitos: backlog/requisitos.md
          - Release Major 1: backlog/release-major-1.md
          - Release Major 2: backlog/release-major-2.md
          - Release Major 3: backlog/release-major-3.md
      - Acompanhamento por Sprint:
          - Visao Geral das Sprints: processo/sprints.md
          - Sprint 1:
              - EVM: processo/evm-sprint1.md
      - Controle:
          - Matriz de Riscos: processo/riscos.md

  - Arquitetura:
      - Visao Geral: arquitetura/visao_geral.md
      - Tecnologias: arquitetura/tecnologias.md
      - Decisoes Arquiteturais: arquitetura/decisoes.md
      - Visoes Arquiteturais:
          - Visao Logica: arquitetura/visoes/logica.md
          - Visao de Processos: arquitetura/visoes/processos.md
          - Visao de Implementacao: arquitetura/visoes/implementacao.md
          - Visao de Implantacao: arquitetura/visoes/implantacao.md
      - Banco de Dados:
          - Modelo V1: arquitetura/banco-de-dados/v1.md
      - Endpoints e Contratos:
          - Visao Geral: arquitetura/api/visao-geral.md
          - Autenticacao: arquitetura/api/autenticacao.md
          - Alunos: arquitetura/api/alunos.md
          - Localidades: arquitetura/api/localidades.md
          - Administracao: arquitetura/api/admin.md
          - Exemplos: arquitetura/api/exemplos.md
          - Erros e Contratos: arquitetura/api/erros.md

  - Qualidade:
      - Metricas e Dashboard: qualidade/qualidade.md

  - Gestao:
      - Metodologia de trabalho: processo/metodologia.md
      - Comunicacao: processo/comunicacao.md
      - Quadro de Conhecimento: processo/quadro-conhecimento.md
      - Decisoes do Projeto: decisoes/decisoes.md

  - Registro:
      - Reunioes: processo/reunioes.md

  - Contribuicao:
      - Codigo de Conduta: contribuicao/codigo_conduta.md
      - Politica de Branchs: contribuicao/politica_branchs.md
      - Politica de Commits: contribuicao/politica_commits.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
